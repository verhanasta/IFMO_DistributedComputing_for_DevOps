- name: Deploy WordPress with MySQL Replication
  hosts: wordpress
  become: yes

  tasks:
    - name: Удаление старого бинарника docker-compose (v1)
      ansible.builtin.file:
        path: /usr/bin/docker-compose
        state: absent
      ignore_errors: true

    - name: Установка Docker, Python-pip и PyMySQL
      ansible.builtin.apt:
        name:
          - docker.io
          - python3-pip
          - python3-pymysql
        state: present
        update_cache: true

    - name: Установка Python-библиотеки Docker для Ansible
      ansible.builtin.pip:
        name: docker
        state: present

    - name: Установка Docker Compose V2 (плагин) на целевом хосте
      ansible.builtin.shell: |
        curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
        mkdir -p /root/.docker/cli-plugins
        ln -sf /usr/local/bin/docker-compose /root/.docker/cli-plugins/docker-compose

    - name: Запуск Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Создание рабочей директории
      ansible.builtin.file:
        path: /opt/wordpress
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

  roles:
    - mysql_master
    - mysql_replica
