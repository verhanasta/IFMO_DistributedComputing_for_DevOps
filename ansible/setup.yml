- name: Deploy WordPress with MySQL Replication
  hosts: wordpress
  become: yes

  tasks:
    - name: Удаление старого бинарника docker-compose (v1)
      ansible.builtin.file:
        path: /usr/bin/docker-compose
        state: absent
      ignore_errors: true

    - name: Установка зависимостей для добавления Docker репозитория
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Добавить официальный GPG ключ Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /usr/share/keyrings/docker-archive-keyring.gpg
        mode: '0644'
      become: true

    - name: Добавить Docker репозиторий
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
        filename: docker
      become: true


    - name: Установка Docker CE и зависимостей
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - python3-pip
          - python3-pymysql
        state: latest
        update_cache: true

    - name: Установка Python-библиотеки Docker для Ansible
      ansible.builtin.pip:
        name: docker
        state: present

    - name: Создать директорию для Docker CLI plugins
      ansible.builtin.file:
        path: /usr/libexec/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Скачать Docker Compose V2 плагин
      ansible.builtin.get_url:
        url: https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64
        dest: /usr/libexec/docker/cli-plugins/docker-compose
        mode: '0755'
        force: no

    - name: Запустить Docker сервис
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Проверить доступ к Docker сокету
      ansible.builtin.command: docker version
      register: docker_version
      changed_when: false

    - debug:
        var: docker_version.stdout

    - name: Запуск Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Создание рабочей директории
      ansible.builtin.file:
        path: /opt/wordpress
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

  roles:
    - mysql_master
    - mysql_replica
