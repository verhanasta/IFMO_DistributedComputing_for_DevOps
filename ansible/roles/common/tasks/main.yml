- name: Установка зависимостей
  apt:
    name:
      - docker.io
      - docker-compose
      - python3-pymysql
    state: present
    update_cache: yes

- name: Запуск Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Создание рабочей директории
  file:
    path: /opt/wordpress
    state: directory
    mode: 0755
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"