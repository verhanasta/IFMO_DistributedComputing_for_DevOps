- name: Создание директории конфигов
  file:
    path: /opt/wordpress/config
    state: directory
    mode: 0755

- name: Развертывание конфига мастера
  template:
    src: "roles/mysql_master/templates/master.cnf.j2"
    dest: "/opt/wordpress/config/master.cnf"
    mode: 0644

- name: Копирование docker-compose
  template:
    src: "docker-compose.yml.j2"
    dest: "/opt/wordpress/docker-compose.yml"
    mode: 0644

- name: Запуск контейнеров
  command: docker-compose up -d
  args:
    chdir: /opt/wordpress

- name: Ожидание готовности MySQL мастера
  shell: |
    docker exec mysql_master mysqladmin ping -uroot -p{{ mysql_root_password }} --silent
  register: mysql_ping
  retries: 30
  delay: 5
  until: mysql_ping.stdout.find('mysqld is alive') != -1

- name: Настройка пользователя репликации
  mysql_user:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    name: replicator
    host: '%'
    password: "{{ replication_password }}"
    priv: '*.*:REPLICATION SLAVE'
    state: present