- name: Создание директории конфигов
  ansible.builtin.file:
    path: /opt/wordpress/config
    state: directory
    mode: '0755'

- name: Развертывание конфига мастера
  ansible.builtin.template:
    src: "roles/mysql_master/templates/master.cnf.j2"
    dest: "/opt/wordpress/config/master.cnf"
    mode: '0644'

- name: Копирование docker-compose
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "/opt/wordpress/docker-compose.yml"
    mode: '0644'

- name: Запуск контейнеров
  community.docker.docker_compose_v2:
    project_src: "{{ work_dir }}"
    state: present
  register: compose_output

- name: Ожидание готовности MySQL мастера
  community.docker.docker_container_info:
    name: mysql_master
  register: mysql_master_info
  until: mysql_master_info.container.State.Health.Status == "healthy"
  retries: 30
  delay: 5

- name: Настройка пользователя репликации
  community.mysql.mysql_user:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    name: replicator
    host: '%'
    password: "{{ replication_password }}"
    priv: '*.*:REPLICATION SLAVE'
    state: present
