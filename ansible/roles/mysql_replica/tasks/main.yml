

- name: Проверить состояние контейнера mysql_master
  community.docker.docker_container_info:
    name: mysql_master
  register: container_info
  failed_when: false
  changed_when: false

- name: Получить логи MySQL
  community.docker.docker_container_logs:
    name: mysql_master
    tail: 50
  register: mysql_logs
  failed_when: false

- name: Проверяем доступность мастера
  wait_for:
    host: 127.0.0.1
    port: 3306
    delay: 10
    timeout: 60

- name: Настраиваем репликацию
  community.docker.docker_container_exec:
    container: mysql_replica
    command: >
      mysql -uroot -p{{ mysql_root_password }} -e "
      CHANGE MASTER TO
      MASTER_HOST='mysql_master',
      MASTER_USER='replicator',
      MASTER_PASSWORD='{{ replication_password }}',
      MASTER_AUTO_POSITION=1;
      START SLAVE;"
  register: replica_setup
  failed_when: "'ERROR' in replica_setup.stderr"

- name: Проверяем статус репликации
  community.docker.docker_container_exec:
    container: mysql_replica
    command: mysql -uroot -p{{ mysql_root_password }} -e "SHOW SLAVE STATUS\G"
  register: replication_status
  changed_when: false
