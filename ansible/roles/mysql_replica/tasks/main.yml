- name: Создаём директорию для конфигов реплики
  file:
    path: /opt/wordpress/config/replica
    state: directory
    mode: 0755

- name: Разворачиваем конфиг реплики
  template:
    src: "roles/mysql_replica/templates/replica.cnf.j2"
    dest: "/opt/wordpress/config/replica/replica.cnf"
    mode: 0644

- name: Проверить состояние контейнера
  shell: |
    docker ps -a --filter name=mysql_master --format "{{ '{{.Status}}' }}"
  register: container_status
  failed_when: false

- name: Получить логи MySQL
  shell: docker logs mysql_master | tail -n 50
  register: mysql_logs
  failed_when: false

- debug:
    msg: |
      Статус контейнера: {{ container_status.stdout }}
      Логи MySQL: {{ mysql_logs.stdout_lines }}

- name: Проверяем доступность мастера
  wait_for:
    host: 127.0.0.1
    port: 3306
    delay: 10
    timeout: 60

- name: Настраиваем репликацию
  command: |
    docker exec mysql_replica mysql -uroot -p{{ mysql_root_password }} -e "
    CHANGE MASTER TO
    MASTER_HOST='mysql_master',
    MASTER_USER='replicator',
    MASTER_PASSWORD='{{ replication_password }}',
    MASTER_AUTO_POSITION=1;
    START SLAVE;"
  register: replica_setup
  failed_when: "'ERROR' in replica_setup.stderr"

- name: Проверяем статус репликации
  command: docker exec mysql_replica mysql -uroot -p{{ mysql_root_password }} -e "SHOW SLAVE STATUS\G"
  register: replication_status
  changed_when: false