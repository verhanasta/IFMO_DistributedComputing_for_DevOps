- name: Получить информацию о контейнере mysql_master
  community.docker.docker_container_info:
    name: mysql_master
  register: master_container_info
  become: yes

- name: Ждать пока MySQL мастер будет доступен
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3306
    timeout: 60
    state: started

- name: Создать пользователя репликации на мастере MySQL
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: "CREATE USER IF NOT EXISTS 'replicator'@'%' IDENTIFIED BY '{{ replication_password }}';"
  become: yes

- name: Выдать права репликации пользователю replicator
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: "GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';"
  become: yes

- name: Применить изменения привилегий
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: "FLUSH PRIVILEGES;"
  become: yes

- name: Получить информацию о контейнере mysql_replica
  community.docker.docker_container_info:
    name: mysql_replica
  register: replica_container_info
  become: yes

- name: Ожидаем доступности порта MySQL на мастере (3306)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3306
    delay: 10
    timeout: 60
    state: started

- name: Настроить репликацию на реплике MySQL через модуль mysql_replication
  community.mysql.mysql_replication:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    primary_host: mysql_master
    primary_port: 3306
    primary_user: replicator
    primary_password: "{{ replication_password }}"
    primary_use_gtid: current_pos
    mode: startreplica
  register: replica_setup
  become: true

- name: Проверить статус репликации с повтором, пока данные не появятся
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: "SHOW SLAVE STATUS"
  register: replication_status
  retries: 5
  delay: 6
  until: replication_status.query_result | length > 0
  changed_when: false
  become: true

- name: Проверяем статус настройки репликации
  debug:
    var: replication_setup_result

