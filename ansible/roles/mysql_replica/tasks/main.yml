- name: Ожидание готовности MySQL мастера
  ansible.builtin.include_tasks:
    file: wait_for_healthy_container.yml
  vars:
    container_name_to_wait: mysql_master
    container_port_to_wait: 3306

- name: Получить логи MySQL
  community.docker.docker_container_logs:
    name: mysql_master
    tail: 50
  register: mysql_logs_info
  failed_when: false

- name: Проверяем доступность мастера
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3306
    delay: 10
    timeout: 60

- name: Настраиваем репликацию
  community.mysql.mysql_replication:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    master_host: mysql_master
    master_port: 3306
    master_user: "{{ replication_user }}"
    master_password: "{{ replication_password }}"
    master_auto_position: yes
    state: start_slave

- name: Проверяем статус репликации
  community.mysql.mysql_replication:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    state: get_slave_status
  register: replication_status
  changed_when: false
