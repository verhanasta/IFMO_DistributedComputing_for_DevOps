- name: Получить информацию о контейнере mysql_master
  community.docker.docker_container_info:
    name: mysql_master
  register: master_container_info
  become: yes

- name: Ждать пока MySQL мастер будет доступен
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3306
    timeout: 60
    state: started

- name: Создать пользователя репликации и выдать права на мастере MySQL
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3306
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: >
      CREATE USER IF NOT EXISTS 'replicator'@'%' IDENTIFIED BY '{{ replication_password }}';
      GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';
      FLUSH PRIVILEGES;
  become: yes

- name: Получить информацию о контейнере mysql_replica
  community.docker.docker_container_info:
    name: mysql_replica
  register: replica_container_info
  become: yes

- name: Ожидаем доступности порта MySQL на мастере (3306)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 3306
    delay: 10
    timeout: 60
    state: started

- name: Настраиваем репликацию на реплике MySQL
  community.mysql.mysql_replication:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    primary_host: 127.0.0.1
    primary_port: 3306
    primary_user: replicator
    primary_password: "{{ replication_password }}"
    primary_use_gtid: current_pos
    mode: startreplica
  register: replication_setup_result
  become: yes

- name: Проверяем статус настройки репликации
  debug:
    var: replication_setup_result

- name: Проверяем статус репликации MySQL с повторами
  community.mysql.mysql_query:
    login_host: 127.0.0.1
    login_port: 3307
    login_user: root
    login_password: "{{ mysql_root_password }}"
    query: "SHOW SLAVE STATUS"
  register: replication_status_check
  until: replication_status_check.query_result | length > 0
  retries: 10
  delay: 6
  changed_when: false
  become: yes

- name: Устанавливаем флаги репликации
  set_fact:
    replication_io: "{{ replication_status_check.query_result[0]['Slave_IO_Running'] | default('unknown') }}"
    replication_sql: "{{ replication_status_check.query_result[0]['Slave_SQL_Running'] | default('unknown') }}"
    replication_lag: "{{ replication_status_check.query_result[0]['Seconds_Behind_Master'] | default('N/A') }}"

- name: Выводим ключевые поля репликации
  debug:
    msg: |
      Репликация IO: {{ replication_io }}
      Репликация SQL: {{ replication_sql }}
      Отставание (сек): {{ replication_lag }}

