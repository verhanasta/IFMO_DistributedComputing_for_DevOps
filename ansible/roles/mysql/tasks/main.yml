- name: Установка зависимостей Python для работы с MySQL
  apt:
    name:
      - python3-pymysql
    state: present
    update_cache: true

- name: Установка MySQL
  apt:
    name: mysql-server
    state: present
    update_cache: true

- name: Копирование my.cnf
  template:
    src: my.cnf.j2
    dest: /etc/mysql/my.cnf
  notify: Перезапуск MySQL

- name: Запуск MySQL и включение автозапуска
  service:
    name: mysql
    state: started
    enabled: true

- name: Создание .my.cnf
  copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ mysql_root_password }}
    mode: '0600'
  no_log: true  # Скрывает пароль в логах

- name: Создание репликационного пользователя
  mysql_user:
    name: replicator
    password: "{{ replication_password }}"
    priv: '*.*:REPLICATION SLAVE'
    host: '%'
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  no_log: true

- name: Получение бинарного лога и позиции
  mysql_replication:
    mode: getprimary
  register: master_status

- name: Сохранение master log info в файл
  copy:
    content: |
      log_file={{ master_status.File }}  # Имя бинарного лога мастера
      log_pos={{ master_status.Position }}  # Позиция в бинарном логе
    dest: /tmp/master_status.txt